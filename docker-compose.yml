# Production stack for ahantime.com:
#   web   — the Next.js app (standalone), reachable only inside the network
#   caddy — public reverse proxy that terminates TLS (auto Let's Encrypt) on 80/443
#
# Usage:  cp .env.example .env && edit .env   then   docker compose up -d --build
services:
  web:
    # `image:` + `build:` together is Compose's "build once, deploy many"
    # pattern: CI builds and pushes this exact tag to GHCR once (see
    # .github/workflows/deploy.yml), and `docker compose pull && up -d` on
    # the server only ever pulls that pre-built layer — the server never
    # spends its own CPU/RAM compiling Next.js. `build:` stays here purely
    # for local dev (`docker compose up -d --build` still works without any
    # of this) and as a manual fallback if the registry is ever unreachable.
    image: ${WEB_IMAGE:-ghcr.io/am1eza/iron-web:local}
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ahantime.com}
        NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-live}
        # See GEO-ROUTING.md — a free-form label, just surfaced on /api/health
        # so a geo-split setup can be verified (curl from Iran vs. abroad and
        # confirm each hit the origin you expect).
        NEXT_PUBLIC_DEPLOY_REGION: ${NEXT_PUBLIC_DEPLOY_REGION:-ir-docker}
    restart: unless-stopped
    # Hardening: no privilege escalation, drop all Linux caps (the app runs as
    # the non-root `nextjs` user on port 3000 — it needs none), and bound
    # memory/PIDs so a leak or fork-bomb can't take the 8GB host down.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 512
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # REQUIRED — the app refuses to start in production without this.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env (openssl rand -hex 32)}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ahantime.com}
      NEXT_PUBLIC_API_MODE: ${NEXT_PUBLIC_API_MODE:-live}
      AUTH_ENFORCED: ${AUTH_ENFORCED:-true}
      DATABASE_URL: postgres://ahantime:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/ahantime
      SEED_ON_START: ${SEED_ON_START:-true}   # idempotent — only fills empty tables
      # SMS.ir — REQUIRED with the defaults above (live mode + AUTH_ENFORCED):
      # OTP login has no fallback, so the app refuses to boot without these.
      SMSIR_API_KEY: ${SMSIR_API_KEY:?set SMSIR_API_KEY in .env (OTP login has no fallback in live mode)}
      SMSIR_TEMPLATE_ID: ${SMSIR_TEMPLATE_ID:?set SMSIR_TEMPLATE_ID in .env (OTP verify template on the SMS.ir panel)}
      SMSIR_LINE_NUMBER: ${SMSIR_LINE_NUMBER:-}   # optional — پیش‌فاکتور/alert texts dev-log if unset
      SMSIR_TEMPLATE_PARAM: ${SMSIR_TEMPLATE_PARAM:-}  # verify-template placeholder name (default OTP — must match #…# in the panel template)
      OTP_FALLBACK_AFTER_MS: ${OTP_FALLBACK_AFTER_MS:-}  # delivery-watchdog delay before 2nd-route resend (default 60000; 0 disables)
      # Fully optional integrations (dev fallbacks / last-known values apply when blank)
      TGJU_BASE_URL: ${TGJU_BASE_URL:-}
      TGJU_API_KEY: ${TGJU_API_KEY:-}
      AI_ENABLED: ${AI_ENABLED:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEV_ADMIN_MOBILE: ${DEV_ADMIN_MOBILE:-}
      ADMIN_MOBILES: ${ADMIN_MOBILES:-}
      SENTRY_DSN: ${SENTRY_DSN:-}   # optional — errors stay console-only if unset
      # Redis: distributed rate limiting + read-through cache. Unset → app
      # falls back to the in-process window and direct DB reads.
      REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379
    expose:
      - "3000"          # internal only — not published to the host
    healthcheck:
      # No curl/wget in the minimal node:alpine runner image — use Node's
      # built-in fetch instead of adding a package just for this.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # migrations (+ optional seed) run before server.js starts

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # No cap_drop here: the postgres entrypoint starts as root and drops to the
    # postgres user itself, so it needs its default caps. Still block privilege
    # escalation and bound resources.
    security_opt:
      - no-new-privileges:true
    mem_limit: 1536m
    pids_limit: 512
    # Tuned for the 1.5GB container / 4-vCPU host (was running on stock defaults:
    # 128MB shared_buffers, spinning-disk cost model). SSD + modern sizing.
    command:
      - postgres
      - -c
      - shared_buffers=384MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=96MB
      - -c
      - work_mem=8MB
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - max_connections=100
    environment:
      POSTGRES_DB: ahantime
      POSTGRES_USER: ahantime
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahantime -d ahantime"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No cap_drop: the redis entrypoint starts as root and drops to the redis
    # user itself (needs SETUID/SETGID), same as the postgres service.
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    pids_limit: 256
    # Password-protected, 256MB cap with LRU eviction (it's a cache), AOF
    # persistence so rate-limit/session counters survive a restart. Not published
    # to the host — only reachable on the internal compose network.
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Keeps default caps (needs NET_BIND_SERVICE for :80/:443), but blocks
    # privilege escalation and bounds resources.
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 256
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # persists issued certificates across restarts
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  redisdata:
