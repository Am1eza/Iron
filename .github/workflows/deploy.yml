name: Deploy to production server

# SSHes into the VPS and re-deploys the Docker Compose stack (see DEPLOY.md).
# Requires these repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST        server IP or hostname (e.g. 109.122.246.60)
#   DEPLOY_USER        SSH user (e.g. root)
#   DEPLOY_SSH_KEY     private key matching a public key already in the
#                      server's ~/.ssh/authorized_keys (never a password —
#                      see "Server setup" in DEPLOY.md for how to add one)
#   DEPLOY_PORT        optional, SSH port (defaults to 22)
#   DEPLOY_PATH        optional, path to the repo on the server
#                      (defaults to /opt/ahantime)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH || '/opt/ahantime' }}"
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker compose up -d --build
            docker compose ps
