name: Deploy to Cloudflare (ahantime.com)

# Builds the Poladin web app (web/) with the OpenNext Cloudflare adapter and
# deploys it to Cloudflare Workers, served on ahantime.com. The custom-domain
# routing is declared in web/wrangler.jsonc.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   token with "Edit Cloudflare Workers" + Workers
#                          Routes + DNS edit on the ahantime.com zone
#   CLOUDFLARE_ACCOUNT_ID  your Cloudflare account id
#
# Runtime secrets used by the app's /api routes (JWT, OTP/SMS, AI keys) are NOT
# set here — configure them once with `wrangler secret put <NAME>` or in the
# dashboard (Workers → ahantime → Settings → Variables).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --no-frozen-lockfile

      - name: Build & deploy (OpenNext → Workers)
        run: pnpm run cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SITE_URL: https://ahantime.com
          NEXT_PUBLIC_API_MODE: ${{ vars.NEXT_PUBLIC_API_MODE || 'mock' }}
