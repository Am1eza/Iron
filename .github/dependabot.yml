version: 2
updates:
  # Web app dependencies (pnpm) — grouped so routine patch/minor bumps land
  # as one PR instead of dozens, but security updates always get their own
  # immediate PR regardless of grouping.
  - package-ecosystem: 'npm'
    directory: '/web'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']
    labels:
      - dependencies

  # GitHub Actions used by the workflows in .github/workflows/.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
